<!-- Create a following table structure in your HTML page.-->
<!DOCTYPE html>
<html>
<head>
    <title>Table Structure</title>
</head>
<body>

<table border="2" cellspacing="0" cellpadding="10" align="center" width="90%">

    <tr>
        <th colspan="3" bgcolor="#99cc00">In</th>
        <th bgcolor="#e6e6e6">Entry</th>
        <th colspan="3" bgcolor="black">
            <font color="white">Parking</font>
        </th>
    </tr>

    <tr>
        <td rowspan="2" bgcolor="#993300"><font color="white">Gym</font></td>
        <td bgcolor="yellow">Library Room</td>
        <td rowspan="5" colspan="2" bgcolor="#ffcc00" align="center">Home</td>
        <td colspan="3" bgcolor="#b3d9d9" align="center">Balcony</td>
    </tr>

    <tr>
        <td bgcolor="yellow">Computer Room</td>
        <td colspan="3" bgcolor="#00ff00" align="center">Drawing Room</td>
    </tr>

  
    <tr>
        <td bgcolor="#cccccc">Music Room</td>
        <td bgcolor="#999999"><font color="white">Dance Floor</font></td>
        <td colspan="2" bgcolor="#ffcc00" align="center">Dining Area</td>
        <td bgcolor="#ffcc00" align="center">Kitchen</td>
    </tr>

    <tr>
        <td colspan="2" bgcolor="#00bfff" align="center">Bedroom</td>
        <td colspan="3" bgcolor="#666699" align="center">
            <font color="white">Play Room</font>
        </td>
    </tr>

    <tr>
        <td rowspan="2"  bgcolor="#cc3399"><font color="white">Master Bedroom</font></td>
        <td  rowspan="2"  bgcolor="#cc3399"><font color="white">Wash Area</font></td>
        <td colspan="3" bgcolor="#cccccc" align="center">Store Room</td>
    </tr>

    <tr>

        <td colspan="2" bgcolor="#e6e6e6" align="center">Exit</td>
        <td colspan="3" bgcolor="red" align="center">Out</td>
   
    </tr>
</table>

</body>
</html>
