<!--Create following table structure in HTML page. (Table inside table)-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h2>Table inside table</h2></center>
    <table border="1" cellpadding="20" cellspacing="0" align="center" >
        <th>
            <table border="1" cellpadding="10" cellspacing="0" ">
                <tr>
                    <th>1</th>
                    <th>2</th>
                </tr>
                <tr>
                    <td>3</td>
                    <td>4</td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>6</td>
                </tr>
                
            </table>
        </th>
        <th>
             <table border="1" cellpadding="10" cellspacing="0" >
                <tr>
                    <th>1</th>
                    <th>2</th>
                </tr>
                <tr>
                    <td>3</td>
                    <td>4</td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>6</td>
                </tr>
             </table>
            </th>
            <tr>
                 <td colspan="0" rowspan="0">
                <table border="1" cellpadding="10" cellspacing="0" >
                    <tr>
                        <th>1</th>
                        <th>2</th>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>4</td>
                    </tr>
                    <tr>
                        <td>5</td>
                        <td>6</td>
                    </tr>
                </table>
            </tr>
            <tr>
                 <td colspan="0" rowspan="0">
                <table border="1" cellpadding="10" cellspacing="0" >
                    <tr>
                        <th>1</th>
                        <th>2</th>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>4</td>
                    </tr>
                    <tr>
                        <td>5</td>
                        <td>6</td>
                    </tr>
                </table>
            </tr>
    
           
</body>
</html>
