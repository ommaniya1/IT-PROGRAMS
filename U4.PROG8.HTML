<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Hyperlinks with CSS</title>
    
    <link rel="stylesheet" href="U4.PROG8.CSS">
</head>
<body>

    <h2>Changing Hyperlink Colors using CSS</h2>
    
    <p>
        <h3>Here is a test link: </h3>
        <a href="https://www.google.com" target="_blank">Click here to visit Google</a>
    </p>
<br><br>
    <ul>
        <li><strong>Unvisited:</strong> Blue</li>
        <li><strong>Hover (Mouse over):</strong> Red with an underline</li>
        <li><strong>Active (Clicking down):</strong> Green</li>
        <li><strong>Visited (After returning):</strong> Purple</li>
    </ul>

</body>
</html>
