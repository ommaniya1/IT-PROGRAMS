<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar Example</title>
    
    <link rel="stylesheet" href="U4.PROG9.CSS">
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div style="padding: 40px; text-align: center;">
        <h2>Welcome to My Website</h2>
        <p>Notice how the navigation bar sits at the top, and the "Home" link is highlighted to indicate the active page.</p>
    </div>
    <div>
        <h4>Additional Content</h4>
        <p>This is some additional content that appears below the main content area.</p>
    </div>
</body>
</html>
