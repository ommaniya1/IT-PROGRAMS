<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS Color Examples</title>
</head>
<body>

    <h2> Color Text Using Inline CSS</h2>

    <p style="color: red;">
        This text uses a standard color name.
    </p>

    <p style="color: #1aa260;">
        This text uses a Hex code .
    </p>

    <p style="color: rgb(128, 0, 128);">
        This text uses RGB values  for purple.
    </p>

    <p>
        This is a normal black sentence, but <span style="color: blue;">this specific part is blue</span>, and the rest is normal again.
    </p>

</body>
</html>
