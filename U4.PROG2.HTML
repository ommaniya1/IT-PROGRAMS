<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS Color Examples</title>
    
    <style>
        .color-red {
            color: red;
        }
        .color-custom-green {
            color: #1aa260;
        }
        .color-purple {
            color: rgb(128, 0, 128);
        }
        .color-highlight {
            color: blue;
            font-weight: bold;
        }       
    </style>
</head>
<body>

    <h2>Color Text Using Internal CSS</h2>

    <p class="color-red">
       i am from bhavanagar and i am a cricketer.
    </p>

    <p class="color-custom-green">
        i am a professional cricketer and i am a batsman.
    </p>

    <p class="color-purple">
        i am a professional cricketer and i am a bowler.
    </p>

    <p>
        in one match i score <span class="color-highlight">106*</span> in one inning.
    </p>

</body>
</html>
