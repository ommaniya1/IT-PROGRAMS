<!--Write a program to create an array in javascript.-->
<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Array in HTML</title>
</head>
<body>

  <h2>Array Example</h2>
  <p id="output"></p>

  <script>
    // Create an array
    let fruits = ["Apple", "Banana", "Mango"];

    // Display array content
    document.getElementById("output").innerHTML = fruits.join(", ");
  </script>

</body>
</html>
