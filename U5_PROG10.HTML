<!--Write a program for Form events of JQuery-->
<!DOCTYPE html>
<html>
<head>
    <title>jQuery Form Events Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        input, select {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            width: 250px;
        }
        .msg {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h2>jQuery Form Events Demo</h2>

<form id="myForm">
    <label>Name:</label>
    <input type="text" id="name">

    <label>Email:</label>
    <input type="email" id="email">

    <label>Country:</label>
    <select id="country">
        <option value="">Select</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
    </select>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
</form>

<div class="msg" id="message"></div>

<script>
$(document).ready(function () {

    // Focus event
    $("#name, #email").focus(function () {
        $(this).css("background-color", "#e0f7fa");
    });

    // Blur event
    $("#name, #email").blur(function () {
        $(this).css("background-color", "#fff");
    });

    // Input event (real-time typing)
    $("#name").on("input", function () {
        $("#message").text("Typing: " + $(this).val());
    });

    // Change event (for select)
    $("#country").change(function () {
        $("#message").text("Country selected: " + $(this).val());
    });

    // Submit event
    $("#myForm").submit(function (e) {
        e.preventDefault(); // prevent page reload
        $("#message").text("Form submitted successfully!");
    });

    // Reset event
    $("#myForm").on("reset", function () {
        $("#message").text("Form reset done!");
    });

});
</script>

</body>
</html>
