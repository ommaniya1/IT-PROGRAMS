<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Color Hover Table</title>
    
    <link rel="stylesheet" href="U4.PROG6.CSS">
</head>
<body>

    <h2>3x3 Color Hover Table</h2>
    <p>Hover over any cell to see its background color change.</p>

    <table>
        <tr>
            <td class="cell-red">Red</td>
            <td class="cell-blue">Blue</td>
            <td class="cell-green">Green</td>
        </tr>
        
        <tr>
            <td class="cell-yellow">Yellow</td>
            <td class="cell-orange">Orange</td>
            <td class="cell-purple">Purple</td>
        </tr>
        
        <tr>
            <td class="cell-pink">Pink</td>
            <td class="cell-cyan">Cyan</td>
            <td class="cell-brown">Brown</td>
        </tr>
    </table>

</body>
</html>
